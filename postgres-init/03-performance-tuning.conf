# PostgreSQL Performance Tuning for 8-Core/16GB Server
# Optimized for 10 concurrent users with high-intensity workloads

# -----------------------------------------------------------------------------
# CONNECTION SETTINGS
# -----------------------------------------------------------------------------
max_connections = 100              # Total connections
# Rationale: 10 users × 5 connections per app × 2 apps = 100 max
# Each connection uses ~2-4MB RAM, 100 connections = ~400MB

# -----------------------------------------------------------------------------
# MEMORY SETTINGS
# -----------------------------------------------------------------------------
shared_buffers = 800MB             # 25% of allocated 2.5GB RAM
# Rule of thumb: 25% of DB memory on Linux
# Formula: min(2.5GB × 0.25, available RAM)

effective_cache_size = 2GB         # 80% of allocated memory
# Query planner assumes this much cache available for the database
# Includes both shared_buffers and OS file system cache

work_mem = 8MB                     # Per-operation memory
# Memory for operations like sorts, hashes, joins
# Formula: (2.5GB - 800MB) / 100 connections / 3 operations ≈ 5MB
# Reduced from 16MB to 8MB to lower OOM risk under concurrent queries

maintenance_work_mem = 256MB       # Maintenance operations
# Used for VACUUM, CREATE INDEX, and other maintenance operations
# Can use larger buffer as these are infrequent

# -----------------------------------------------------------------------------
# WRITE-AHEAD LOG (WAL)
# -----------------------------------------------------------------------------
wal_buffers = 16MB                 # 2% of shared_buffers
# Memory for WAL data that hasn't been written to disk yet

min_wal_size = 1GB                 # Minimum WAL size
max_wal_size = 4GB                 # Maximum WAL size
# Prevents excessive WAL growth during high write periods

checkpoint_completion_target = 0.9 # Spread checkpoint I/O over time
# Reduces I/O spikes during checkpoints

# -----------------------------------------------------------------------------
# QUERY PLANNER (Optimized for SSD)
# -----------------------------------------------------------------------------
random_page_cost = 1.1             # Cost of non-sequentially fetched disk page
# Default for HDD is 4.0, SSD is typically 1.1
# Significantly improves query planning for SSD storage

effective_io_concurrency = 200     # Number of simultaneous I/O requests
# SSDs can handle many concurrent I/O operations efficiently

# -----------------------------------------------------------------------------
# BACKGROUND WRITER
# -----------------------------------------------------------------------------
bgwriter_delay = 200ms             # Background writer delay between rounds
bgwriter_lru_maxpages = 100        # Max pages to flush per round
bgwriter_lru_multiplier = 2.0      # Multiplier for buffers flushed
# Keeps buffer cache clean without I/O spikes

# -----------------------------------------------------------------------------
# LOGGING
# -----------------------------------------------------------------------------
log_min_duration_statement = 1000  # Log queries taking >1 second
# Helps identify slow queries for optimization

# -----------------------------------------------------------------------------
# VECTOR EXTENSION (pgvector)
# -----------------------------------------------------------------------------
# Note: These are set at database level, not in postgresql.conf
# Example per-database settings:
# ALTER DATABASE mydb SET ivfflat.probes = 10;
# ALTER DATABASE mydb SET ivfflat.probes = sqrt(lists);
